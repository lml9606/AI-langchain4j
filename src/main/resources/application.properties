spring.application.name=langchain4j
server.port=8081
## 大模型配置
langchain4j.community.dashscope.chat-model.model-name=qwen-max
langchain4j.community.dashscope.chat-model.api-key= <Your API Key>
## 大模型流式输出
langchain4j.community.dashscope.streaming-chat-model.api-key= <Your API Key>
langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-max

## 大模型 向量嵌入模型
langchain4j.community.dashscope.embedding-model.api-key= <Your API Key>
langchain4j.community.dashscope.embedding-model.model-name=qwen-max


